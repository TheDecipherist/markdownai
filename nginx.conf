server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/webp;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|webp|png|jpg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
